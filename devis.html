<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Devis HOME BY TIKA</title>
  <meta name="robots" content="noindex,nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --ivory: #fbf7ed;
      --ivory-soft: #f4ead2;
      --noir: #1a1410;
      --gold: #c89968;
      --gold-pale: #d4a766;
      --muted: #7a6f5e;
      --line: #e8dcbf;
    }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; overflow-x: hidden; max-width: 100vw; }
    body {
      background: linear-gradient(180deg, #3a342a 0%, #2c2620 100%);
      font-family: 'Inter', sans-serif;
      color: var(--ivory);
      min-height: 100vh;
    }
    .actions-bar {
      background: rgba(20, 16, 12, 0.85);
      padding: 0.9rem 1.2rem;
      display: flex; gap: 0.6rem; flex-wrap: wrap;
      align-items: center; justify-content: space-between;
      backdrop-filter: blur(8px);
      border-bottom: 1px solid rgba(200, 153, 104, 0.18);
      position: sticky; top: 0; z-index: 50;
    }
    .actions-bar .brand {
      font-family: 'Playfair Display', serif;
      font-size: 1.2rem; color: var(--ivory);
      letter-spacing: 1px;
    }
    .actions-bar .brand em { color: var(--gold); font-style: italic; font-weight: 600; }
    .actions-bar .btns { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    .btn-action {
      padding: 0.6rem 1rem; font-size: 0.74rem; letter-spacing: 1.5px;
      text-transform: uppercase; font-weight: 700; border-radius: 2px;
      cursor: pointer; text-decoration: none; border: 1px solid var(--gold);
      background: transparent; color: var(--gold); font-family: 'Inter', sans-serif;
      transition: all 0.2s ease;
      display: inline-flex; align-items: center; gap: 0.4rem;
    }
    .btn-action:hover { background: var(--gold); color: #fff; }
    .btn-action.primary { background: var(--gold); color: #fff; }
    .btn-action.primary:hover { background: #b58451; }
    .btn-action.wa { background: #25d366; border-color: #25d366; color: #fff; }
    .btn-action.wa:hover { background: #20bd5a; }

    /* Page A4 */
    .page-wrap {
      padding: 2rem 1rem;
      display: flex; justify-content: center;
    }
    .page {
      width: 100%;
      max-width: 210mm;
      background: var(--ivory);
      color: var(--noir);
      padding: 18mm 16mm;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
      box-sizing: border-box;
    }
    .page header.doc-head {
      display: flex; justify-content: space-between;
      align-items: flex-start;
      border-bottom: 2px solid var(--gold);
      padding-bottom: 16px; margin-bottom: 24px;
      flex-wrap: wrap; gap: 1rem;
    }
    .page .brand-label {
      font-family: 'Playfair Display', Georgia, serif;
      font-size: 22pt; color: var(--noir); font-weight: 500; letter-spacing: 1px; line-height: 1;
    }
    .page .brand-label em { color: var(--gold); font-style: italic; font-weight: 600; }
    .page .brand-sub {
      color: var(--muted); font-size: 9pt; letter-spacing: 3px;
      text-transform: uppercase; margin-top: 4px;
    }
    .page .doc-id-block { text-align: right; }
    .page .doc-badge {
      background: var(--gold); color: #fff;
      padding: 8px 18px; font-size: 14pt; font-weight: 700;
      letter-spacing: 3px; display: inline-block;
    }
    .page .doc-num {
      font-family: Menlo, 'Courier New', monospace;
      font-size: 10.5pt; margin-top: 8px; color: var(--noir);
    }
    .page .doc-date {
      color: var(--muted); font-size: 9pt; margin-top: 2px;
    }
    .infos-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem 2rem; margin-bottom: 24px; }
    .infos-grid .label {
      color: var(--gold); font-size: 8pt; letter-spacing: 2px;
      text-transform: uppercase; font-weight: 700; margin-bottom: 6px;
    }
    .infos-grid .client-block {
      background: rgba(200, 153, 104, 0.07);
      border-left: 3px solid var(--gold);
      padding: 14px 16px;
    }
    .infos-grid .text { font-size: 10pt; line-height: 1.5; color: var(--noir); }
    .infos-grid .text strong { color: var(--noir); }

    table.items {
      width: 100%; border-collapse: collapse; margin-bottom: 24px;
    }
    table.items thead tr { background: var(--noir); color: var(--gold); }
    table.items th {
      padding: 11px 12px; text-align: left;
      font-size: 8.5pt; letter-spacing: 2px;
      text-transform: uppercase; font-weight: 700;
    }
    table.items td {
      padding: 14px 12px; border-bottom: 1px solid var(--line);
      font-size: 9.5pt; color: var(--noir);
    }
    table.items td strong { font-size: 11pt; }
    table.items .right { text-align: right; }
    table.items .center { text-align: center; }

    .total-block { text-align: right; margin-bottom: 24px; }
    .total-block table { display: inline-block; border-collapse: collapse; }
    .total-block td { padding: 8px 16px; }
    .total-block .label-cell {
      color: var(--muted); font-size: 10pt;
      letter-spacing: 1.5px; text-transform: uppercase;
    }
    .total-block .value-cell {
      background: var(--noir); color: var(--gold);
      font-size: 14pt; font-weight: 700;
      font-family: 'Playfair Display', Georgia, serif;
      text-align: right; min-width: 160px;
    }
    .notes-block {
      background: rgba(200, 153, 104, 0.06);
      border-left: 3px solid var(--gold);
      padding: 14px 18px; margin-bottom: 14px;
      font-size: 9.5pt; line-height: 1.6; color: var(--noir);
    }
    .notes-block .label {
      color: var(--gold); font-size: 8pt; letter-spacing: 2px;
      text-transform: uppercase; font-weight: 700; margin-bottom: 8px;
    }
    .footer-line {
      border-top: 1px solid var(--line);
      padding-top: 14px; margin-top: 24px;
      text-align: center; color: var(--muted);
      font-size: 8.5pt; letter-spacing: 1px; line-height: 1.5;
    }

    .loading, .error {
      max-width: 600px; margin: 4rem auto;
      background: var(--ivory); color: var(--noir);
      padding: 2.5rem; border-radius: 4px;
      text-align: center;
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.4);
    }
    .loading h2, .error h2 {
      font-family: 'Playfair Display', serif;
      color: var(--gold); margin: 0 0 0.6rem;
    }
    .spinner {
      display: inline-block; width: 22px; height: 22px;
      border: 3px solid var(--gold); border-right-color: transparent;
      border-radius: 50%; animation: hbt-spin 0.7s linear infinite;
      margin: 0.6rem 0;
    }
    @keyframes hbt-spin { to { transform: rotate(360deg); } }

    @media (max-width: 720px) {
      .actions-bar { flex-direction: column; align-items: stretch; }
      .actions-bar .btns { justify-content: stretch; }
      .actions-bar .brand { text-align: center; margin-bottom: 0.3rem; }
      .page-wrap { padding: 1rem 0.5rem; }
      .page { padding: 8mm 6mm; }
      .page .brand-label { font-size: 16pt; }
      .page .doc-badge { font-size: 11pt; padding: 6px 12px; }
      .infos-grid { grid-template-columns: 1fr; }
      table.items thead { display: none; }
      table.items tbody tr { display: block; border-bottom: 1px solid var(--line); padding: 8px 0; }
      table.items td { display: flex; justify-content: space-between; padding: 4px 8px; border: none; font-size: 9pt; }
      table.items td::before {
        content: attr(data-label);
        color: var(--gold); font-weight: 700;
        font-size: 8pt; letter-spacing: 1.5px; text-transform: uppercase;
      }
      .total-block { text-align: center; }
      .total-block table { width: 100%; }
    }
    @media print {
      .actions-bar { display: none; }
      body { background: #fff; }
      .page-wrap { padding: 0; }
      .page { box-shadow: none; max-width: none; }
    }
  </style>
</head>
<body>

  <!-- Barre d'actions (sticky) -->
  <div class="actions-bar" id="actions-bar">
    <div class="brand">HOME BY <em>TIKA</em></div>
    <div class="btns" id="actions-btns">
      <span style="color:var(--muted);font-size:0.85rem;">Chargement…</span>
    </div>
  </div>

  <!-- Contenu (devis ou état) -->
  <div id="root" class="page-wrap">
    <div class="loading">
      <div class="spinner"></div>
      <h2>Chargement de votre devis…</h2>
      <p style="color:var(--muted);">Un instant, nous récupérons les informations.</p>
    </div>
  </div>

  <script src="config.js"></script>
  <script>
  (function () {
    'use strict';
    const params = new URLSearchParams(location.search);
    const quoteId = (params.get('id') || '').trim();
    const root = document.getElementById('root');
    const actionsBox = document.getElementById('actions-btns');

    function escapeHtml(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
    function fcfa(n) {
      if (n == null || isNaN(n)) return '—';
      return new Intl.NumberFormat('fr-FR', { maximumFractionDigits: 0 }).format(n) + ' FCFA';
    }
    function fmtDate(d) {
      if (!d) return '';
      try { return new Date(d).toLocaleDateString('fr-FR', { day: '2-digit', month: 'long', year: 'numeric' }); }
      catch (e) { return String(d); }
    }

    function showError(title, detail) {
      root.innerHTML = `
        <div class="error">
          <h2>${escapeHtml(title)}</h2>
          <p style="color:var(--muted);line-height:1.55;">${detail || ''}</p>
          <a href="index.html" style="display:inline-block;margin-top:1rem;color:var(--gold);">← Retour au site</a>
        </div>`;
      actionsBox.innerHTML = '';
    }

    if (!quoteId) {
      showError('Devis introuvable', 'Aucun identifiant de devis fourni dans l\'URL. Format attendu : <code>devis.html?id=DEV-XXXX</code>');
      return;
    }
    if (!window.HBT_CONFIG || !window.HBT_CONFIG.isSupabaseReady || !window.HBT_CONFIG.isSupabaseReady()) {
      showError('Service indisponible', 'La configuration Supabase n\'est pas active. Contactez HOME BY TIKA sur WhatsApp.');
      return;
    }

    async function loadQuote() {
      try {
        const url = window.HBT_CONFIG.supabase.url +
                    '/rest/v1/quote_requests?quote_id=eq.' + encodeURIComponent(quoteId) +
                    '&select=*';
        const res = await fetch(url, {
          headers: {
            apikey: window.HBT_CONFIG.supabase.anonKey,
            Authorization: 'Bearer ' + window.HBT_CONFIG.supabase.anonKey
          },
          cache: 'no-store'
        });
        if (!res.ok) {
          const txt = await res.text();
          showError('Erreur ' + res.status, escapeHtml(txt.slice(0, 200)));
          return;
        }
        const arr = await res.json();
        if (!arr || arr.length === 0) {
          showError('Devis introuvable', 'Aucun devis trouvé avec la référence <strong>' + escapeHtml(quoteId) + '</strong>. Vérifiez votre lien ou contactez-nous.');
          return;
        }
        renderQuote(arr[0]);
      } catch (e) {
        showError('Erreur réseau', escapeHtml(e.message));
      }
    }

    function renderQuote(q) {
      const items = Array.isArray(q.quote_items) ? q.quote_items : [];
      const rows = items.map(it => {
        const qty = Number(it.qty) || 1;
        const unit = Number(it.unit_price);
        const dim = (it.dimensions || '').trim() || 'À confirmer';
        const wood = (it.wood || '').trim() || '—';
        const total = (unit && qty) ? unit * qty : null;
        return `<tr>
          <td data-label="Désignation"><strong>${escapeHtml(it.name || '—')}</strong></td>
          <td data-label="Dimensions">${escapeHtml(dim)}</td>
          <td data-label="Essence">${escapeHtml(wood)}</td>
          <td data-label="Qté" class="center">${qty}</td>
          <td data-label="PU" class="right">${unit ? fcfa(unit) : '—'}</td>
          <td data-label="Total" class="right" style="font-weight:600;">${total != null ? fcfa(total) : 'À confirmer'}</td>
        </tr>`;
      }).join('') || '<tr><td colspan="6" style="text-align:center;color:var(--muted);font-style:italic;padding:30px;">Aucun article</td></tr>';

      const total = Number(q.quote_total) || 0;
      const date = fmtDate(q.quote_created_at || q.created_at);

      root.innerHTML = `
        <div class="page">
          <header class="doc-head">
            <div>
              <div class="brand-label">HOME BY <em>TIKA</em></div>
              <div class="brand-sub">Bois massif · Côte d'Ivoire</div>
            </div>
            <div class="doc-id-block">
              <div class="doc-badge">DEVIS</div>
              <div class="doc-num">${escapeHtml(q.quote_id || '—')}</div>
              <div class="doc-date">Émis le ${escapeHtml(date)}</div>
            </div>
          </header>

          <div class="infos-grid">
            <div>
              <div class="label">Atelier</div>
              <div class="text">
                <strong>HOME BY TIKA</strong><br>
                Songon, Cité la Grâce<br>
                Abidjan, Côte d'Ivoire<br>
                WhatsApp : +225 07 48 73 86 71<br>
                contact@homebytika.ci
              </div>
            </div>
            <div class="client-block">
              <div class="label">Client</div>
              <div class="text">
                <strong>${escapeHtml(q.customer_name || '—')}</strong><br>
                ${q.phone ? escapeHtml(q.phone) + '<br>' : ''}
                ${q.email ? escapeHtml(q.email) + '<br>' : ''}
                ${q.location ? escapeHtml(q.location) : ''}
              </div>
            </div>
          </div>

          <table class="items">
            <thead><tr>
              <th>Désignation</th>
              <th>Dimensions</th>
              <th>Essence</th>
              <th class="center">Qté</th>
              <th class="right">PU</th>
              <th class="right">Total</th>
            </tr></thead>
            <tbody>${rows}</tbody>
          </table>

          <div class="total-block">
            <table>
              <tr>
                <td class="label-cell">Total général</td>
                <td class="value-cell">${fcfa(total)}</td>
              </tr>
              ${q.quote_delay ? '<tr><td class="label-cell">Délai estimé</td><td style="padding:6px 16px;color:var(--noir);font-size:10pt;font-weight:600;text-align:right;">' + escapeHtml(q.quote_delay) + '</td></tr>' : ''}
              <tr><td colspan="2" style="padding:4px 16px;color:var(--muted);font-size:8pt;text-align:right;">FCFA · Mobile Money &amp; virement acceptés</td></tr>
            </table>
          </div>

          ${q.quote_notes ? '<div class="notes-block"><div class="label">Notes du devis</div>' + escapeHtml(q.quote_notes).replace(/\n/g, '<br>') + '</div>' : ''}
          ${q.quote_conditions ? '<div class="notes-block"><div class="label">Conditions</div>' + escapeHtml(q.quote_conditions).replace(/\n/g, '<br>') + '</div>' : ''}

          <div class="footer-line">
            HOME BY TIKA · Ébénisterie premium · Iroko · Framiré · Teck<br>
            Devis valable 30 jours · Merci de votre confiance
          </div>
        </div>
      `;

      // Boutons d'action
      const waNumber = (window.HBT_CONFIG.contact && window.HBT_CONFIG.contact.whatsapp) || '2250748738671';
      const waMsg = encodeURIComponent('Bonjour HOME BY TIKA, je souhaite échanger sur le devis ' + (q.quote_id || '') + '.');
      const waUrl = 'https://wa.me/' + waNumber + '?text=' + waMsg;
      actionsBox.innerHTML = `
        <button type="button" class="btn-action primary" id="dl-pdf">📄 Télécharger PDF</button>
        <button type="button" class="btn-action" onclick="window.print()">🖨 Imprimer</button>
        <a href="${waUrl}" target="_blank" rel="noopener" class="btn-action wa">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M12 0C5.4 0 0 5.4 0 12c0 2.1.5 4.1 1.6 5.9L0 24l6.3-1.7c1.7 1 3.7 1.5 5.7 1.5 6.6 0 12-5.4 12-12S18.6 0 12 0z"/></svg>
          WhatsApp HOME BY TIKA
        </a>
      `;
      document.getElementById('dl-pdf').addEventListener('click', downloadPDF);
    }

    async function downloadPDF() {
      const btn = document.getElementById('dl-pdf');
      btn.disabled = true;
      const originalText = btn.textContent;
      btn.textContent = 'Préparation…';
      // Charge html2pdf si pas déjà
      if (!window.html2pdf) {
        await new Promise((resolve, reject) => {
          const s = document.createElement('script');
          s.src = 'https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js';
          s.onload = resolve; s.onerror = () => reject(new Error('CDN bloqué'));
          document.head.appendChild(s);
        }).catch(() => {
          alert('Téléchargement direct indisponible. Utilisez "Imprimer" puis "Enregistrer au format PDF" depuis votre navigateur.');
          btn.disabled = false; btn.textContent = originalText;
        });
      }
      if (!window.html2pdf) return;
      const pageEl = document.querySelector('.page');
      try {
        await window.html2pdf().from(pageEl).set({
          margin: 0,
          filename: quoteId + '.pdf',
          image: { type: 'jpeg', quality: 0.95 },
          html2canvas: { scale: 2, backgroundColor: '#fbf7ed', useCORS: true },
          jsPDF: { unit: 'mm', format: 'a4', orientation: 'portrait' }
        }).save();
      } catch (e) {
        alert('Erreur PDF : ' + e.message + '. Utilisez Imprimer → Enregistrer en PDF.');
      } finally {
        btn.disabled = false; btn.textContent = originalText;
      }
    }

    loadQuote();
  })();
  </script>
</body>
</html>
